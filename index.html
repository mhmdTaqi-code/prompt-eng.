<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 1rem 0; background: transparent; color: var(--color-text-primary, #1a1a1a); }
.sec { margin-bottom: 14px; }
.lbl { font-size: 10.5px; color: var(--color-text-secondary, #888); margin-bottom: 5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
.era-tabs, .building-grid, .prompt-tabs, .action-row { display: flex; gap: 6px; flex-wrap: wrap; }
.era-tabs { margin-bottom: 10px; }
.building-grid { margin-bottom: 12px; }
button { font-family: inherit; }
.era-btn, .b-btn, .prompt-tab { border: 0.5px solid #ccc; background: var(--color-background-primary, #fff); color: var(--color-text-primary, #222); cursor: pointer; font-size: 11px; }
.era-btn { padding: 5px 11px; border-radius: 8px; }
.b-btn { padding: 5px 10px; border-radius: 6px; color: var(--color-text-secondary, #555); border-color: #ddd; }
.prompt-tab { padding: 6px 10px; border-radius: 8px; }
.era-btn.on { background: #EEEDFE; border-color: #7F77DD; color: #3C3489; font-weight: 600; }
.b-btn.on { background: #FFF3E0; border-color: #E07B00; color: #7a3d00; font-weight: 600; }
.prompt-tab.on { background: #E8F5E9; border-color: #2E7D32; color: #1B5E20; font-weight: 700; }
.inputs input { width: 100%; margin-bottom: 6px; padding: 7px 10px; font-size: 12px; border: 0.5px solid #ddd; border-radius: 8px; background: var(--color-background-primary, #fff); color: var(--color-text-primary, #222); }
.pbox { direction: ltr; text-align: left; background: var(--color-background-secondary, #f7f7f7); border: 0.5px solid #ddd; border-radius: 10px; padding: 1.1rem; font-size: 11.5px; line-height: 1.9; white-space: pre-wrap; word-break: break-word; max-height: 560px; overflow-y: auto; color: var(--color-text-primary, #222); }
.cbtn, .secondary-btn { margin-top: 10px; padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
.cbtn { background: #534AB7; color: #fff; border: none; }
.cbtn:hover { background: #3C3489; }
.cbtn.warn { background: #B7791F; }
.cbtn.ok { background: #2E7D32; }
.secondary-btn { background: #fff; color: #3C3489; border: 0.5px solid #7F77DD; }
.secondary-btn:hover { background: #EEEDFE; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-left: 6px; background: #E3F2FD; color: #1565C0; border: 0.5px solid #90CAF9; }
.helper { margin-top: 7px; font-size: 11px; color: var(--color-text-secondary, #777); line-height: 1.6; }
</style>
</head>
<body>

<div class="sec">
  <div class="lbl">العصر المعماري</div>
  <div class="era-tabs" id="eraRow"></div>
</div>

<div class="sec">
  <div class="lbl">اختر المبنى</div>
  <div class="building-grid" id="bRow"></div>
</div>

<div class="sec inputs">
  <div class="lbl">اسم الطالب واسم المشروع</div>
  <input id="sName" placeholder="Student Name — الاسم الكامل" />
  <input id="pName" placeholder="اسم المشروع — Project Title" />
</div>

<div class="lbl">نوع البرومت <span class="tag">بافيلون على مسطح مائي — حديقة بغداد</span></div>
<div class="prompt-tabs" id="promptTabs"></div>

<div class="lbl">البرومت الحالي</div>
<div class="pbox" id="pbox">اختر العصر والمبنى...</div>

<div class="action-row">
  <button class="cbtn" id="copyBtn" type="button">نسخ البرومت الحالي</button>
  <button class="secondary-btn" id="newDesignBtn" type="button">تصميم جديد / Seed جديد</button>
  <button class="secondary-btn" id="exportBtn" type="button">Export Prompts (For Loop)</button>
</div>
<div class="helper" id="copyHelp">إذا منع المتصفح النسخ التلقائي، سيتم تحديد النص حتى تنسخه يدوياً.</div>

function pickRandom(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

function makeVariationSeed(){
  const now = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}-${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}${String(now.getSeconds()).padStart(2,"0")}`;
  const randomPart = Math.floor(Math.random() * 100000).toString().padStart(5,"0");
  return `${stamp}-${randomPart}`;
}

function makeVariation(){
  return {
    seed:     makeVariationSeed(),
    strategy: pickRandom(DESIGN_STRATEGIES),
    massing:  pickRandom(MASSING_VARIATIONS),
    ornament: pickRandom(ORNAMENT_VARIATIONS)
  };
}

function pavilionRulesBlock(){
  return `━━━ FIXED PAVILION RULES — WATER PAVILION IN BAGHDAD GARDEN ━━━
THIS IS A PAVILION SITTING ON A WATER SURFACE — NOT A BRIDGE CROSSING WATER.

WHAT THIS MEANS:
• The pavilion is a freestanding structure built ON TOP of a still water pool / reflecting pond.
• It does NOT cross the water from one bank to the other.
• Visitors reach it via TWO narrow pedestrian walkways / causeways (1.5–2.0 m wide):
  - Walkway 1: ENTRY — connects garden path on one side to the pavilion
  - Walkway 2: EXIT — connects pavilion to garden path on the opposite or adjacent side
  These two causeways give movement flexibility (enter one side, exit another).
• The water surrounds the pavilion on all or most sides.
• The pavilion platform sits 0.3–0.5 m above the water surface — very low, feeling close to water.
• Water surface: calm, still, dark blue-green, reflective — mirrors the pavilion structure beautifully.

PAVILION FOOTPRINT:
• Plan: 6 × 6 metres square — the main pavilion fits exactly within this square.
• The two causeways/walkways are NOT part of the 6×6 m — they are thin connections outside it.
• The pavilion may have seating areas, terraces, or shaded zones within the 6×6 m square.
• Internal circulation: open and flexible — visitors can sit, stand, move freely inside.

PAVILION CHARACTER:
• It is a DESTINATION, not a passage — a place to pause, sit, and experience the water.
• Seating elements (built-in benches, low platforms, steps to water) are encouraged within the design.
• The pavilion is mostly open or semi-open — sheltered overhead, open sides facing water.
• Architectural frame covers 100% of the pavilion footprint with historical character.
• May integrate subtle contemporary structural elements but historical identity must dominate.

SETTING — BAGHDAD PUBLIC GARDEN (حديقة بغداد):
• Surrounding landscape: lush green garden with palms, cypress, flowering shrubs, grass.
• Stone-paved garden paths lead to the entry and exit causeways.
• Water pool: calm rectangular or free-form reflecting pond, 15–25 m across minimum.
• The pavilion sits in the middle or near-centre of the water feature.
• Time: golden hour soft light, long soft shadows, warm atmosphere.

CAUSEWAYS / WALKWAYS:
• Width: 1.5–2.0 m each — narrow, elegant, not wide bridges.
• They may be straight, slightly curved, or at an angle to the pavilion.
• Railing or balustrade on both sides of each causeway.
• Length: however needed to reach the pavilion from the garden bank.
• The two causeways do NOT have to be parallel — they can enter from different directions.`;
}

  const btn = document.getElementById("copyBtn");
  btn.textContent = text;
  btn.classList.remove("ok","warn");
  if(mode) btn.classList.add(mode);
  setTimeout(()=>{ btn.textContent="نسخ البرومت الحالي"; btn.classList.remove("ok","warn"); }, 2500);
}

async function copyWithClipboardAPI(text){
  if(!navigator.clipboard || typeof navigator.clipboard.writeText !== "function") throw new Error("Clipboard API unavailable");
  await navigator.clipboard.writeText(text);
}

function copyWithExecCommand(text){
  const ta = document.createElement("textarea");
  ta.value = text; ta.setAttribute("readonly","");
  ta.style.cssText = "position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;";
  document.body.appendChild(ta); ta.focus(); ta.select();
  let copied = false;
  try { copied = Boolean(document.execCommand && document.execCommand("copy")); }
  finally { document.body.removeChild(ta); }
  return copied;
}

function selectPromptForManualCopy(){
  const pbox = document.getElementById("pbox");
  const range = document.createRange(); range.selectNodeContents(pbox);
  const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
}

async function doCopy(){
  const text = document.getElementById("pbox").textContent || lastPrompt || gen();
  try { await copyWithClipboardAPI(text); setCopyStatus("تم النسخ ✓","ok"); return; }
  catch(err){ console.warn("Clipboard API blocked",err); }
  if(copyWithExecCommand(text)){ setCopyStatus("تم النسخ ✓","ok"); return; }
  selectPromptForManualCopy(); setCopyStatus("حددت النص — انسخه يدوياً","warn");
}

function generateAllPromptsArray(){
  if(!lastVariation) lastVariation = makeVariation();
  return PROMPT_TYPES.map(t => buildSinglePrompt(t.id, lastVariation));
}

function buildUserscriptPromptsBlock(){
  const arr = generateAllPromptsArray();
  return "let prompts = " + JSON.stringify(arr, null, 2) + ";";
}

function exportPromptsForScript(){
  exportMode = true;
  const formatted = buildUserscriptPromptsBlock();
  document.getElementById("pbox").textContent = formatted;
  lastPrompt = formatted;
}

function bindEvents(){
  document.getElementById("eraRow").addEventListener("click", e => {
    const btn = e.target.closest(".era-btn"); if(!btn) return;
    curEra = btn.dataset.e; curB = null; lastVariation = makeVariation();
    buildEras(); buildBuildings(); update();
  });
  document.getElementById("bRow").addEventListener("click", e => {
    const btn = e.target.closest(".b-btn"); if(!btn) return;
    curB = btn.dataset.b; lastVariation = makeVariation();
    buildBuildings(); update();
  });
  document.getElementById("promptTabs").addEventListener("click", e => {
    const btn = e.target.closest(".prompt-tab"); if(!btn) return;
    currentPromptType = btn.dataset.type; buildPromptTabs(); update();
  });
  document.getElementById("sName").addEventListener("input", update);
  document.getElementById("pName").addEventListener("input", update);
  document.getElementById("copyBtn").addEventListener("click", doCopy);
  document.getElementById("newDesignBtn").addEventListener("click", newDesign);
  document.getElementById("exportBtn").addEventListener("click", exportPromptsForScript);
}

function init(){
  curB = Object.keys(ERAS[curEra].buildings)[0];
  lastVariation = makeVariation();
  buildEras(); buildBuildings(); buildPromptTabs(); bindEvents(); update();
}

init();
</script>
